<tr id="reply-{{ reply.pk }}" class="hover:bg-gray-50">
    <td class="px-6 py-4 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{ reply.name }}</div>
        <div class="text-sm text-gray-500 truncate max-w-xs">{{ reply.response|truncatewords:10 }}</div>
    </td>
    <td class="px-6 py-4">
        <div class="flex flex-wrap gap-1">
            {% for keyword in reply.keywords|slice:":3" %}
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">
                {{ keyword }}
            </span>
            {% endfor %}
            {% if reply.keywords|length > 3 %}
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-500">
                +{{ reply.keywords|length|add:"-3" }} more
            </span>
            {% endif %}
        </div>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        <button hx-post="{% url 'replies:toggle' reply.pk %}"
                hx-target="#reply-{{ reply.pk }}"
                hx-swap="outerHTML"
                class="focus:outline-none">
            {% if reply.is_active %}
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 cursor-pointer hover:bg-green-200">
                Active
            </span>
            {% else %}
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800 cursor-pointer hover:bg-gray-200">
                Inactive
            </span>
            {% endif %}
        </button>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        {{ reply.use_count }} times
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
        <button hx-get="{% url 'replies:edit' reply.pk %}"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="text-primary-600 hover:text-primary-900 mr-3">
            Edit
        </button>
        <button hx-delete="{% url 'replies:delete' reply.pk %}"
                hx-target="#replies-list"
                hx-swap="innerHTML"
                hx-confirm="Are you sure you want to delete '{{ reply.name }}'?"
                class="text-red-600 hover:text-red-900">
            Delete
        </button>
    </td>
</tr>
