{% for reply in replies %}
{% include 'replies/partials/reply_row.html' %}
{% empty %}
<tr>
    <td colspan="5" class="px-6 py-12 text-center">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
        </svg>
        <h3 class="mt-2 text-sm font-medium text-gray-900">No predefined replies</h3>
        <p class="mt-1 text-sm text-gray-500">Get started by creating your first auto-reply.</p>
        <button hx-get="{% url 'replies:create' %}"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="mt-4 inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-primary-600 hover:bg-primary-700">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
            </svg>
            Add Reply
        </button>
    </td>
</tr>
{% endfor %}
