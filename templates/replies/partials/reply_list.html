{% load i18n %}
{% for reply in replies %}
{% include 'replies/partials/reply_row.html' %}
{% empty %}
<tr>
    <td colspan="5" class="px-6 py-16 text-center">
        <div class="w-24 h-24 bg-gradient-to-br from-coral-100 via-lemon-100 to-mint-100 rounded-3xl flex items-center justify-center mx-auto mb-6 animate-float shadow-playful">
            <span class="text-5xl">⚡</span>
        </div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">{% trans "No predefined replies" %}</h3>
        <p class="text-gray-500 mb-6 max-w-md mx-auto">{% trans "Get started by creating your first auto-reply!" %} <span class="emoji-hover">✨</span></p>
        <button hx-get="{% url 'replies:create' %}"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-coral-500 to-lemon-500 text-white font-bold rounded-2xl shadow-playful hover:from-coral-600 hover:to-lemon-600 transition-all btn-playful">
            <span class="mr-2">➕</span>
            {% trans "Add Reply" %}
        </button>
    </td>
</tr>
{% endfor %}
